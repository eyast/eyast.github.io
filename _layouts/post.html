---
layout: default
---
<article class="post">
  <header class="post-header">
    <div class="container container-narrow">
      {% if page.show_date %}<p class="post-date">{{ page.date | date: "%B %-d, %Y" }}</p>{% endif %}
      <h1 class="post-title">{{ page.title }}</h1>
      {% if page.description %}<p class="post-lede">{{ page.description }}</p>{% endif %}
    </div>
  </header>
  {% if page.image %}
  <div class="container container-narrow">
    <figure class="post-hero-image">
      <img src="{{ page.image | relative_url }}" alt="{{ page.title | escape }}">
    </figure>
  </div>
  {% endif %}
  <div class="container container-narrow">
    <div class="post-body prose">
      {{ content }}
    </div>
  </div>
</article>

{% include cta.html %}
