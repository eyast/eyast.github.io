---
layout: default
---
<article class="page">
  <header class="page-header">
    <div class="container container-narrow">
      <h1 class="page-title">{{ page.title }}</h1>
      {% if page.description %}<p class="page-lede">{{ page.description }}</p>{% endif %}
    </div>
  </header>
  <div class="container container-narrow">
    <div class="page-body prose">
      {{ content }}
    </div>
  </div>
</article>
