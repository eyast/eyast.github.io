<header class="site-header">
  <div class="container header-inner">
    <a class="site-logo" href="{{ '/' | relative_url }}">{{ site.title }}</a>
    <div class="header-actions">
      <nav class="site-nav" id="site-nav" aria-label="Primary">
        <ul>
          {% for link in site.nav_links %}
          <li>
            <a href="{{ link.url | relative_url }}" {% if page.url == link.url or (link.url != '/' and page.url contains link.url) %}class="active" aria-current="page"{% endif %}>{{ link.title }}</a>
          </li>
          {% endfor %}
        </ul>
      </nav>
      <button class="theme-toggle" id="theme-toggle" role="switch" aria-checked="false" aria-label="Dark mode"></button>
      <button class="nav-toggle" id="nav-toggle" aria-label="Toggle menu" aria-expanded="false" aria-controls="site-nav">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
</header>
