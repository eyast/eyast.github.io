<article class="project-card">
  <a href="{{ project.url | relative_url }}">
    <div class="project-card-image">
      {% if project.image %}
      <img src="{{ project.image | relative_url }}" alt="{{ project.title | escape }}" loading="lazy">
      {% else %}
      <div class="project-card-placeholder" aria-hidden="true"><span>{{ project.title | slice: 0, 1 }}</span></div>
      {% endif %}
    </div>
    <h3 class="project-card-title">{{ project.title }}</h3>
    <p class="project-card-client">{{ project.subtitle }}</p>
  </a>
</article>
