<figure class="content-figure{% if include.class %} {{ include.class }}{% endif %}">
  <a href="{{ include.path | relative_url }}" target="_blank" rel="noopener" aria-label="Open full-size image">
    <img src="{{ include.path | relative_url }}" alt="{{ include.alt | default: include.caption | escape }}" loading="lazy">
  </a>
  {% if include.caption %}<figcaption>{{ include.caption }}</figcaption>{% endif %}
</figure>
