<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#f7f6ed"/>
  <!-- isometric occupancy voxels -->
  <g stroke="#0d042b" stroke-width="3" stroke-linejoin="round">
    <g transform="translate(640,300)">
      <!-- voxel helper: drawn manually as iso cubes -->
      <g>
        <path d="M0,0 L80,-40 L160,0 L80,40 Z" fill="#faebd7"/>
        <path d="M0,0 L80,40 L80,130 L0,90 Z" fill="#fdfcf9"/>
        <path d="M160,0 L80,40 L80,130 L160,90 Z" fill="#efe3cf"/>
      </g>
      <g transform="translate(-160,80)">
        <path d="M0,0 L80,-40 L160,0 L80,40 Z" fill="#faebd7"/>
        <path d="M0,0 L80,40 L80,130 L0,90 Z" fill="#fdfcf9"/>
        <path d="M160,0 L80,40 L80,130 L160,90 Z" fill="#efe3cf"/>
      </g>
      <g transform="translate(0,160)">
        <path d="M0,0 L80,-40 L160,0 L80,40 Z" fill="#faebd7"/>
        <path d="M0,0 L80,40 L80,130 L0,90 Z" fill="#fdfcf9"/>
        <path d="M160,0 L80,40 L80,130 L160,90 Z" fill="#efe3cf"/>
      </g>
      <g transform="translate(160,80)">
        <path d="M0,0 L80,-40 L160,0 L80,40 Z" fill="#faebd7"/>
        <path d="M0,0 L80,40 L80,130 L0,90 Z" fill="#fdfcf9"/>
        <path d="M160,0 L80,40 L80,130 L160,90 Z" fill="#efe3cf"/>
      </g>
    </g>
  </g>
  <!-- camera trajectory -->
  <path d="M120,600 C300,520 380,420 520,430 S760,520 900,430 S1120,280 1180,220" fill="none" stroke="#0d042b" stroke-width="5" stroke-dasharray="2 14" stroke-linecap="round"/>
  <g fill="#0d042b">
    <circle cx="120" cy="600" r="10"/>
    <circle cx="520" cy="430" r="10"/>
    <circle cx="900" cy="430" r="10"/>
    <circle cx="1180" cy="220" r="10"/>
  </g>
  <text x="80" y="120" font-family="Fira Mono, monospace" font-size="34" fill="#3b364c">occupancy ⟵ (cam₀…cam₄, imu)</text>
</svg>
