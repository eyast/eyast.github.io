# Site settings
title: Eyas Taifour
description: >-
  Portfolio and selected writing of Eyas Taifour — computer vision,
  machine learning, computer graphics, and essays.
url: "https://eyast.github.io"
baseurl: ""
author:
  name: Eyas Taifour
  email: etaifour@me.com

# Social
github_username: eyast
linkedin_username: etaifour
kaggle_username: etaifour

# Navigation
nav_links:
  - title: Home
    url: /
  - title: About
    url: /about/
  - title: Contact
    url: /contact/

# Build settings
markdown: kramdown
highlighter: rouge

sass:
  style: compressed

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

collections:
  projects:
    output: true
    permalink: /projects/:name/

defaults:
  - scope:
      path: ""
      type: projects
    values:
      layout: project
  - scope:
      path: ""
      type: posts
    values:
      layout: post

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor
  - .claude
